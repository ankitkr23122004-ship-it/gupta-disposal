<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gupta Disposal - Patna</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fffbeb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #eab308; }
        .header { background: #1f2937; padding: 25px 20px; color: white; text-align: center; }
        .header h2 { font-size: 1.4rem; color: #facc15; text-transform: uppercase; letter-spacing: 1px; }
        .stars { color: #facc15; font-size: 1.2rem; margin: 8px 0; }
        .content { padding: 25px; text-align: center; }
        .review-box { background: #fefce8; border: 2px dashed #eab308; border-radius: 12px; padding: 20px; margin-bottom: 20px; min-height: 110px; display: flex; align-items: center; }
        #text-box { color: #451a03; font-size: 1rem; line-height: 1.5; font-weight: 500; text-align: left; }
        .btn { background: #eab308; color: #000; border: none; width: 100%; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 0 #ca8a04; transition: 0.2s; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .footer { font-size: 0.8rem; color: #9ca3af; margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="stars">★★★★★</div>
        <h2>GUPTA DISPOSAL</h2>
        <p style="font-size: 0.8rem; opacity: 0.9;">Wholesale & Retail Disposal Shop</p>
    </div>
    <div class="content">
        <div class="review-box">
            <div id="text-box">Review loading...</div>
        </div>
        <button class="btn" onclick="copyReview()">COPY & POST REVIEW</button>
        <p class="footer">Patna's Best Shop for Party Items</p>
    </div>
</div>

<script>
    const reviews = [
        "Retail me bhi wholesale wala rate milta hai yahan, Patna me sasta aur badhiya disposal items ke liye best shop hai.",
        "Gupta Disposal me products ki quality bahut achi hai aur rate ekdam wajib (genuine) hai. Wholesale price me retail ka saman mil jata hai.",
        "Patna me sasta disposal items chahiye to yahi aaiye. Wholesale aur retail dono me market se kam price hai.",
        "Saman ka bahut variety hai yahan. Plates, cups aur party items ka rate ekdam pocket friendly hai.",
        "Best shop for disposal items in Patna. Retail me bhi wholesale price lagate hain, behavior bhi bahut acha hai.",
        "Market se sasta aur badhiya quality. Gupta disposal me wholesale rate par retail saman milta hai, bahut sahi shop hai.",
        "Party supplies aur disposable items ke liye best jagah hai. Price ekdam wholesale wala rehta hai.",
        "Yahan ka rate aur quality dono best hai. Retail bacho ke liye bhi wholesale cost lag jata hai, must visit.",
        "Bahut hi sasta aur badiya dukan hai Patna me. Wholesale rate me retail ka sara item mil jata hai.",
        "Disposable items ka wholesale aur retail dono ka rate bahut kam hai yahan. Quality me koi compromise nahi."
    ];

    function generateReview() {
        return reviews[Math.floor(Math.random() * reviews.length)];
    }

    document.getElementById('text-box').innerText = generateReview();

    function copyReview() {
        const text = document.getElementById('text-box').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Review Copied! Ab Google par Paste karein.");
            window.location.href = "https://search.google.com/local/writereview?placeid=ChIJq-LYGD6p8jkR0zF3EESlWrU";
        });
    }
</script>
</body>
</html>
